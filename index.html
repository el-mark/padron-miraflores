<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Padrón Electoral Miraflores Zona 6 — Consulta tu inscripción</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #0E4678;
    --lime: #B9CD01;
    --lime-soft: #f4f7d9;
    --orange: #F89934;
    --orange-soft: #fff3e6;
    --orange-dark: #c9781a;
    --sky: #5BC0DE;
    --sky-soft: rgba(91, 192, 222, 0.18);
    --ink: #575756;
    --ink-muted: #757574;
    --ink-faint: #9a9a99;
    --surface: #f7f8f9;
    --card: #ffffff;
    --accent: var(--orange);
    --accent-light: var(--orange-soft);
    --accent-dark: var(--orange-dark);
    --green: var(--brand);
    --green-light: var(--lime-soft);
    --border: rgba(14, 70, 120, 0.10);
    --border-strong: rgba(14, 70, 120, 0.16);
    --radius: 12px;
    --radius-sm: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 4rem;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--brand);
    color: #fff;
    padding: 2rem 1.25rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  /* .site-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 18px,
      rgba(255,255,255,0.03) 18px,
      rgba(255,255,255,0.03) 19px
    );
  } */
  .header-flag {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 1rem;
    position: relative;
  }
  .flag-stripe {
    width: 28px;
    height: 6px;
    border-radius: 2px;
  }
  .flag-stripe.red { background: var(--orange); }
  .flag-stripe.white { background: #fff; }
  .flag-stripe.blue { background: var(--sky); }
  .flag-stripe.green { background: var(--lime); }
  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    position: relative;
    margin-bottom: 0.4rem;
  }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(26px, 6vw, 38px);
    color: #fff;
    line-height: 1.15;
    position: relative;
  }
  .header-subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    margin-top: 0.5rem;
    position: relative;
  }

  /* ── SEARCH ZONE ── */
  .search-zone {
    max-width: 560px;
    margin: -1.5rem auto 0;
    padding: 0 1rem;
    position: relative;
    z-index: 10;
  }
  .search-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    box-shadow: 0 4px 24px rgba(14, 70, 120, 0.10);
    padding: 1.25rem;
  }
  .search-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 0.6rem;
  }
  .search-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .search-input-wrap {
    flex: 1;
    position: relative;
  }
  .search-input-wrap svg {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-faint);
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    padding: 13px 13px 13px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }
  #searchInput:focus {
    border-color: var(--sky);
    box-shadow: 0 0 0 3px var(--sky-soft);
    background: #fff;
  }
  #searchInput::placeholder { color: var(--ink-faint); }
  .clear-btn {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    width: 44px;
    height: 44px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--ink-muted);
    transition: background 0.1s;
    flex-shrink: 0;
  }
  .clear-btn:hover { background: var(--accent-light); color: var(--accent); }
  .clear-btn.visible { display: flex; }

  .search-hint {
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 0.6rem;
  }

  /* ── MAIN CONTENT ── */
  .main {
    max-width: 560px;
    margin: 1.25rem auto 0;
    padding: 0 1rem;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 0.75rem;
    min-height: 24px;
  }
  .status-count { font-weight: 500; color: var(--ink); }

  /* ── FOUND BANNER ── */
  .found-banner {
    background: var(--green-light);
    border: 1px solid rgba(185, 205, 1, 0.45);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--green);
    font-weight: 500;
    margin-bottom: 0.75rem;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .found-banner.visible { display: flex; }

  /* ── VOTER CARDS ── */
  .results { display: flex; flex-direction: column; gap: 8px; }

  .voter-card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    transition: box-shadow 0.15s, border-color 0.15s;
    animation: fadeUp 0.18s ease both;
  }
  .voter-card:hover {
    border-color: var(--border-strong);
    box-shadow: 0 2px 12px rgba(14, 70, 120, 0.07);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .voter-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .voter-name mark {
    background: rgba(248, 153, 52, 0.22);
    color: var(--accent-dark);
    border-radius: 3px;
    padding: 0 2px;
  }

  /* ── EMPTY STATES ── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--ink-muted);
  }
  .empty-icon {
    font-size: 40px;
    margin-bottom: 0.75rem;
    display: block;
    opacity: 0.35;
  }
  .empty-title { font-size: 16px; font-weight: 500; margin-bottom: 0.35rem; color: var(--ink); }
  .empty-sub { font-size: 13px; color: var(--ink-faint); line-height: 1.6; }

  /* ── FOOTER ── */
  .site-footer {
    text-align: center;
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 3rem;
    padding: 0 1rem;
  }
  .site-footer a { color: var(--brand); text-decoration: none; }
  .site-footer a:hover { color: var(--sky); text-decoration: underline; }

</style>
</head>
<body>

<header class="site-header" role="banner">
  <div class="header-flag" aria-hidden="true">
    <div class="flag-stripe green"></div>
    <div class="flag-stripe red"></div>
    <div class="flag-stripe blue"></div>
  </div>
  <p class="header-eyebrow">Padrón Electoral Miraflores Zona 6</p>
  <h1 class="header-title">Consulta tu inscripción</h1>
  <p class="header-subtitle">Busca tu nombre y verifica que estás registrado</p>
</header>

<div class="search-zone" role="search" aria-label="Búsqueda de votantes">
  <div class="search-card">
    <p class="search-label">Buscar votante</p>
    <div class="search-row">
      <div class="search-input-wrap">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input
          type="search"
          id="searchInput"
          placeholder="Escribe tu nombre o apellido…"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="Nombre del votante"
          aria-describedby="searchHint"
        />
      </div>
      <button class="clear-btn" id="clearBtn" aria-label="Limpiar búsqueda" title="Limpiar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <p class="search-hint" id="searchHint">Puedes buscar por nombre, apellido paterno o materno</p>
  </div>
</div>

<main class="main" id="main" aria-live="polite" aria-atomic="true">
  <div class="status-bar">
    <span id="statusText">Padrón con <span class="status-count" id="totalCount">0</span> votantes registrados</span>
  </div>
  <div class="found-banner" id="foundBanner" role="status">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
    <span id="bannerMsg"></span>
  </div>
  <div class="results" id="results" aria-label="Resultados"></div>
</main>

<footer class="site-footer">
  <p>
    Padrón Electoral &nbsp;·&nbsp; v1.0 &nbsp;·&nbsp; Datos oficiales &nbsp;·&nbsp;
    Hecho por <a href="https://www.linkedin.com/in/mharmsenr/" target="_blank" rel="noopener">Mark Harmsen</a>
  </p>
</footer>

<script src="voters.js"></script>
<script>
// ─────────────────────────────────────────────
//  VOTER DATA — see voters.js (const VOTERS)
// ─────────────────────────────────────────────

// ─────────────────────────────────────────────
//  CONFIG — tweak as needed
// ─────────────────────────────────────────────
const MAX_RESULTS   = 50;   // cap shown results per search
const MIN_CHARS     = 2;    // minimum characters before searching

// ─────────────────────────────────────────────
//  DOM refs
// ─────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const clearBtn    = document.getElementById('clearBtn');
const results     = document.getElementById('results');
const statusText  = document.getElementById('statusText');
const totalCount  = document.getElementById('totalCount');
const foundBanner = document.getElementById('foundBanner');
const bannerMsg   = document.getElementById('bannerMsg');

totalCount.textContent = VOTERS.length.toLocaleString('es-PE');

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function normalize(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function highlight(name, query) {
  const nName  = normalize(name);
  const nQuery = normalize(query);
  let result = '';
  let i = 0;
  while (i < name.length) {
    const chunk = nName.slice(i, i + nQuery.length);
    if (chunk === nQuery) {
      result += '<mark>' + name.slice(i, i + nQuery.length) + '</mark>';
      i += nQuery.length;
    } else {
      result += name[i];
      i++;
    }
  }
  return result;
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderCard(voter, query) {
  const highlightedName = highlight(esc(voter.name), esc(query));
  return `
    <article class="voter-card">
      <div class="voter-name">${highlightedName}</div>
    </article>
  `;
}

function search(rawQuery) {
  const query = rawQuery.trim();
  const normQ = normalize(query);

  clearBtn.classList.toggle('visible', query.length > 0);

  if (query.length < MIN_CHARS) {
    foundBanner.classList.remove('visible');
    statusText.innerHTML = `Padrón con <span class="status-count" id="totalCount">${VOTERS.length.toLocaleString('es-PE')}</span> votantes registrados`;
    results.innerHTML = `
      <div class="empty-state" role="status">
        <span class="empty-icon" aria-hidden="true">🗳️</span>
        <p class="empty-title">Escribe para buscar</p>
        <p class="empty-sub">Ingresa al menos ${MIN_CHARS} letras de tu nombre o apellido</p>
      </div>`;
    return;
  }

  const matches = VOTERS.filter(v => normalize(v.name).includes(normQ));
  const shown   = matches.slice(0, MAX_RESULTS);

  // Status bar
  if (matches.length === 0) {
    statusText.textContent = 'Sin resultados';
  } else if (matches.length === 1) {
    statusText.textContent = '1 votante encontrado';
  } else {
    const extra = matches.length > MAX_RESULTS ? ` (mostrando ${MAX_RESULTS})` : '';
    statusText.textContent = `${matches.length.toLocaleString('es-PE')} votantes encontrados${extra}`;
  }

  // Confirmation banner for exact / single match
  if (matches.length === 1) {
    bannerMsg.textContent = `${matches[0].name} figura en el padrón`;
    foundBanner.classList.add('visible');
  } else {
    foundBanner.classList.remove('visible');
  }

  // Results list
  if (matches.length === 0) {
    results.innerHTML = `
      <div class="empty-state" role="status">
        <span class="empty-icon" aria-hidden="true">🔍</span>
        <p class="empty-title">No encontramos ese nombre</p>
        <p class="empty-sub">Prueba con un apellido distinto o revisa la ortografía.<br>Los acentos no importan para la búsqueda.</p>
      </div>`;
    return;
  }

  results.innerHTML = shown.map(v => renderCard(v, query)).join('');
}

// ─────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────
let debounceTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => search(searchInput.value), 120);
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchInput.focus();
  search('');
});

// Initial render
search('');
</script>
</body>
</html>
